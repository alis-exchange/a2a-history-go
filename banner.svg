<svg viewBox="0 0 900 250" width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background-color: #121212;">
  <style>
    .label {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-weight: bold;
      font-size: 18px;
      fill: #777;
    }
    .sublabel {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-size: 12px;
      fill: #777;
    }
    .code-line {
      stroke-linecap: round;
      stroke-width: 4;
    }
  </style>

  <defs>
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#4285F4" opacity="0.15" />
    </pattern>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F02222" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#F02222" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#F02222" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <line x1="300" y1="20" x2="300" y2="230" stroke="#333" stroke-dasharray="4,4" />
  <line x1="600" y1="20" x2="600" y2="230" stroke="#333" stroke-dasharray="4,4" />

  <text x="150" y="210" class="label" text-anchor="middle">💬 Messages</text>
  <text x="150" y="230" class="sublabel" text-anchor="middle">Human &amp; Agent Chat</text>

  <text x="450" y="210" class="label" text-anchor="middle">🕵️ Intercept</text>
  <text x="450" y="230" class="sublabel" text-anchor="middle">Traffic Recording</text>

  <text x="750" y="210" class="label" text-anchor="middle">🗄️ Persist</text>
  <text x="750" y="230" class="sublabel" text-anchor="middle">Cloud Spanner Threads</text>

  <g transform="translate(80, 45)">
    
    <g opacity="0.9">
      <polygon points="15,20 0,28 10,10" fill="#4285F4" opacity="0.8" />
      <rect x="10" y="0" width="80" height="26" rx="10" fill="#4285F4" opacity="0.8" />
      <line x1="22" y1="13" x2="80" y2="13" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    </g>

    <g transform="translate(40, 38)">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.2; 0.25; 0.9; 1" dur="6s" repeatCount="indefinite" />
      <polygon points="75,20 90,28 80,10" fill="#334155" />
      <polygon points="75,20 90,28 80,10" fill="none" stroke="#475569" stroke-width="1.5" />
      <rect x="0" y="0" width="80" height="26" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5" />
      
      <circle cx="25" cy="13" r="3" fill="#F02222">
        <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.2s" begin="0s" repeatCount="indefinite" />
      </circle>
      <circle cx="40" cy="13" r="3" fill="#F02222">
        <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="55" cy="13" r="3" fill="#F02222">
        <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
      </circle>
    </g>

    <g transform="translate(0, 76)">
      <animate attributeName="opacity" values="0; 0; 0.9; 0.9; 0" keyTimes="0; 0.6; 0.65; 0.95; 1" dur="6s" repeatCount="indefinite" />
      <polygon points="15,20 0,28 10,10" fill="#4285F4" opacity="0.8" />
      <rect x="10" y="0" width="55" height="26" rx="10" fill="#4285F4" opacity="0.8" />
      <line x1="22" y1="13" x2="55" y2="13" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    </g>

  </g>

  <g transform="translate(450, 100)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#F02222" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#4285F4" stroke-width="1" stroke-dasharray="2 6" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.2" />

    <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#334155" stroke="#475569" stroke-width="1.5" />
    
    <circle cx="0" cy="0" r="14" fill="#F02222" opacity="0.1" />
    <path d="M 0,-14 L 0,14 M -14,0 L 14,0" fill="none" stroke="#F02222" stroke-width="1" opacity="0.4" />
    
    <rect x="-10" y="-2" width="20" height="4" fill="#F02222" opacity="0.8">
        <animate attributeName="x" values="-10; -4; -10" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8; 0.2; 0.8" dur="1s" repeatCount="indefinite" />
    </rect>

    <circle cx="0" cy="0" r="10" fill="url(#glow)">
      <animate attributeName="r" values="10; 45" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 0" dur="2s" repeatCount="indefinite" />
    </circle>

    <g stroke="#4285F4" stroke-width="1" opacity="0.6">
        <line x1="-35" y1="-30" x2="-18" y2="-12" />
        <line x1="-35" y1="30" x2="-18" y2="12" />
    </g>

    <g transform="translate(18, 0)" opacity="0.8">
        <circle cx="5" cy="5" r="3" fill="#F02222" />
        <circle cx="15" cy="-5" r="2.5" fill="#fff" />
        <circle cx="25" cy="5" r="2" fill="#4285F4" opacity="0.6" />
        <line x1="0" y1="0" x2="35" y2="0" stroke="#F02222" stroke-width="1" opacity="0.6" />
    </g>

  </g>

  <g transform="translate(750, 100)">
    <g stroke="#4285F4" stroke-width="2" fill="none">
      <ellipse cx="0" cy="-20" rx="35" ry="12" opacity="0.8" />
      <path d="M -35,-20 L -35,0 A 35 12 0 0 0 35,0 L 35,-20" opacity="0.6" />
      <path d="M -35,0 L -35,20 A 35 12 0 0 0 35,20 L 35,0" opacity="0.4" />
    </g>

    <circle cx="0" cy="-45" r="3" fill="#F02222">
      <animate attributeName="cy" values="-45; -20" dur="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 1; 0" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="15" cy="-55" r="2" fill="#fff" opacity="0.6">
      <animate attributeName="cy" values="-55; -20" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.6; 0" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="-15" cy="-50" r="2" fill="#4285F4" opacity="0.8">
      <animate attributeName="cy" values="-50; -20" dur="0.9s" begin="0.7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.8; 0" dur="0.9s" begin="0.7s" repeatCount="indefinite" />
    </circle>
    
    <line x1="-15" y1="-18" x2="15" y2="-18" stroke="#F02222" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="-10" y1="2" x2="20" y2="2" stroke="#4285F4" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="2.5s" repeatCount="indefinite" />
    </line>
  </g>

  <path id="flowPath" d="M 0,100 C 150,100 200,60 300,100 S 400,100 450,100 S 500,140 600,100 S 700,100 900,100" fill="none" stroke="url(#pipelineGradient)" stroke-width="2" opacity="0.3" />
  
  <circle r="4" fill="#fff">
    <animate attributeName="fill" 
             values="#ccc;#ccc;#F02222;#F02222;#4285F4;#4285F4" 
             keyTimes="0;0.333;0.334;0.666;0.667;1" 
             dur="7s" 
             repeatCount="indefinite" />
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#flowPath"/>
    </animateMotion>
  </circle>

  <circle r="3" fill="#4285F4">
    <animate attributeName="fill" 
             values="#4285F4;#4285F4;#F02222;#F02222;#ccc;#ccc" 
             keyTimes="0;0.333;0.334;0.666;0.667;1" 
             dur="7s" 
             repeatCount="indefinite" />
    <animateMotion dur="14s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
      <mpath href="#flowPath"/>
    </animateMotion>
  </circle>

</svg>
